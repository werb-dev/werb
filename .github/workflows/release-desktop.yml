name: Release builds

# Tag-driven release pipeline. Push a tag like `v0.1.0` and this
# workflow builds both:
#
#   - The Tauri desktop app for macOS (Apple Silicon), Linux, and
#     Windows (see the `build-desktop` job).
#   - The standalone `werb` CLI binary for macOS (Apple Silicon +
#     Intel), Linux (musl, fully static), and Windows (see
#     `build-cli`).
#
# All artifacts attach to the same draft GitHub Release — desktop
# builds via tauri-action, CLI binaries via softprops/action-gh-release.
# We don't auto-publish — review the draft before flipping it to public.
#
# Triggering manually via workflow_dispatch is supported, but the
# release jobs need a tag — they'll fail otherwise.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon — covers every Mac sold since 2020. Intel
          # macOS (x86_64) was dropped from v0.1.0 because the GitHub
          # Actions macos-13 runner pool is queue-starved (jobs sit
          # 30-60+ min waiting for a runner). Intel Mac users can run
          # the web PWA in the meantime; a separate on-demand workflow
          # can revive x86_64 builds if anyone asks.
          - platform: macos-14
            target: aarch64-apple-darwin
            bundle: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb,appimage
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis,msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          # vendor/beerjson submodule — @werb/validate, the desktop
          # bundle, and the Rust schema tests all need it.
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      # Linux needs the WebKitGTK + libssl + a few other system deps
      # before Tauri can compile. macOS + Windows runners ship with
      # everything bundled.
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache Cargo deps per-target so subsequent releases compile in
      # minutes instead of half an hour.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./apps/desktop/src-tauri -> target
            ./crates/werb-beerxml-wasm -> target

      # taiki-e/install-action ships a maintained Node 24 runtime;
      # jetli/wasm-pack-action is pinned to Node 16 and on the
      # actions-deprecation track.
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Generate types
        run: pnpm gen:types

      - name: Build WASM for the web bundle
        run: pnpm --filter @werb/desktop build:wasm

      # tauri-action runs `tauri build`, collects the resulting
      # artifacts, and uploads them to a draft GitHub Release named
      # after the tag (e.g. "Werb v0.1.0"). The first run on a fresh
      # tag creates the release; subsequent runs (other matrix legs)
      # append to it.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "Werb ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the full list of changes.

            Downloads below — pick the one that matches your OS. macOS builds are Apple Silicon only (aarch64); Intel Mac users can run the [web PWA](https://werb-dev.github.io/werb/) for now.

            The `werb` CLI (`convert`, `validate`) ships in this same release as separate archives below — pick the `werb-<target>` asset for your platform, or `cargo install --git https://github.com/${{ github.repository }} werb-cli`.
          releaseDraft: true
          prerelease: false

  # The CLI is a thin, no-system-deps Rust binary. We build it for
  # four targets covering the homebrew/data-eng platforms most users
  # actually run from a shell, and attach each as a separate archive
  # to the same draft release the desktop job creates.
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon — native build on macos-14 (Apple Silicon runner).
          - target: aarch64-apple-darwin
            platform: macos-14
            archive: tar.gz
          # Intel macOS — cross-compiled from the same Apple Silicon
          # runner. No SDK setup needed; the rustup target alone covers
          # a `cargo build` for the CLI (no system libs to link).
          - target: x86_64-apple-darwin
            platform: macos-14
            archive: tar.gz
          # Linux — musl target so the resulting binary is fully static
          # and runs on any glibc/musl distro without dependency drift.
          - target: x86_64-unknown-linux-musl
            platform: ubuntu-22.04
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            platform: windows-latest
            archive: zip

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          # vendor/beerjson submodule — werb-cli embeds the schema
          # files at compile time via include_str!.
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./crates/werb-cli -> target
          key: cli-${{ matrix.target }}

      # musl target needs the musl-gcc toolchain on the Ubuntu runner.
      - name: Install musl-gcc
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build werb CLI
        run: cargo build --release --target ${{ matrix.target }} -p werb-cli

      - name: Package archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          name="werb-${{ matrix.target }}"
          # Stage under the workspace, not /tmp. softprops/action-gh-
          # release is a Node action and reads $GITHUB_OUTPUT as a
          # literal path; Git Bash on the Windows runner produces a
          # Unix-style /tmp/... path that Node can't resolve. A
          # workspace-relative path round-trips cleanly on every
          # runner.
          stage="dist/$name"
          mkdir -p "$stage"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            cp "target/${{ matrix.target }}/release/werb.exe" "$stage/"
            cp LICENSE README.md "$stage/"
            (cd dist && 7z a "$name.zip" "$name" > /dev/null)
            echo "asset=dist/$name.zip" >> "$GITHUB_OUTPUT"
          else
            cp "target/${{ matrix.target }}/release/werb" "$stage/"
            cp LICENSE README.md "$stage/"
            (cd dist && tar czf "$name.tar.gz" "$name")
            echo "asset=dist/$name.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Werb ${{ github.ref_name }}"
          draft: true
          files: ${{ steps.package.outputs.asset }}
          fail_on_unmatched_files: true
